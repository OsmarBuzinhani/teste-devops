name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main", "desenvolvimento" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Localizar e Compilar Java
      # Este comando procura qualquer arquivo .java no repositório e compila
      run: |
        find . -name "*.java" > java_files.txt
        if [ -s java_files.txt ]; then
          javac $(cat java_files.txt)
          echo "Sucesso: Arquivos Java compilados."
        else
          echo "Erro: Nenhum arquivo Java encontrado no repositório!"
          exit 1
        fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Simulating Continuous Deployment
      run: echo "Deploy executado com sucesso no servidor!"

  discord:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Discord Commits
        uses: Sniddl/discord-commits@v1.8
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          template: "avatar-with-link"
          include-extras: true