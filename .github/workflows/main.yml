name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main", "desenvolvimento" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4 
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven' 
    
    - name: Executar Testes Unitários (Maven)
      run: mvn clean test

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Simulating Continuous Deployment
      run: echo "Deploy executado com sucesso no servidor!"

  discord:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Enviar Notificação
        uses: appleboy/discord-action@master
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          message: "🚀 Pipeline finalizado com sucesso no branch ${{ github.ref_name }}!"